<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Gray Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f1f5f9;
            /* 落ち着いたライトグレー */
            color: #334155;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            overflow: hidden;
            width: 1280px;
            height: 1024px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 756px 400px;
            grid-template-rows: 924px;
            gap: 24px;
            padding: 50px;
            height: 100%;
            width: 100%;
            box-sizing: border-box;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .photo-frame {
            position: relative;
            overflow: hidden;
            padding: 0;
            background: #cbd5e1;
            border: 1px solid #e2e8f0;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            filter: grayscale(10%) contrast(95%);
            /* 彩度をわずかに落として馴染ませる */
        }

        .photo-frame img.active {
            opacity: 1;
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .clock-display {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1;
            margin-top: 10px;
            color: #1e293b;
        }

        .date-display {
            font-size: 1.5rem;
            color: #64748b;
            font-weight: 500;
        }

        .weather-icon {
            font-size: 5.5rem;
            margin-bottom: 20px;
            color: #475569;
            /* グラデーションを廃止し、落ち着いたグレーに */
        }

        .temp-display {
            font-size: 4.5rem;
            font-weight: 600;
            color: #1e293b;
        }

        .locale {
            font-size: 1.5rem;
            font-weight: 500;
            color: #64748b;
            margin-top: 10px;
        }

        .weather-desc {
            font-size: 1.1rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 600;
        }

        .sync-indicator {
            position: absolute;
            bottom: 0;
            right: 0;
            left: 0;
            height: 2px;
            background: rgba(0, 0, 0, 0.02);
            overflow: hidden;
        }

        .sync-progress {
            height: 100%;
            background: #94a3b8;
            width: 0%;
            transition: width 1s linear;
        }
    </style>
</head>

<body>

    <div class="dashboard-container">
        <!-- Photo Frame (Main Area) -->
        <div class="card photo-frame" id="photoFrame">
            <div class="sync-indicator">
                <div id="progressBar" class="sync-progress"></div>
            </div>
        </div>

        <!-- Info Panel (Side Area) -->
        <div class="info-panel">
            <!-- Time Card -->
            <div class="card flex-1">
                <div id="dateDisplay" class="date-display">----/--/--</div>
                <div id="clockDisplay" class="clock-display">00:00:00</div>
            </div>

            <!-- Weather Card -->
            <div class="card flex-[1.5] items-center text-center">
                <div id="weatherIcon" class="weather-icon">
                    <i class="fas fa-circle-notch fa-spin text-4xl"></i>
                </div>
                <div id="tempDisplay" class="temp-display">--°C</div>
                <div id="weatherDesc" class="weather-desc">Syncing...</div>
                <div id="locale" class="locale">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        /**
         * APP CONFIGURATION
         */
        const APP_CONFIG = {
            location: {
                locale: "Asia/Tokyo",
                latitude: 35.6895,
                longitude: 139.6917
            },
            intervals: {
                clock: 1000,
                photoSwitch: 30000,
                weatherUpdate: 900000,
                rescanFolder: 300000
            },
            images: [
                "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=1200&q=80",
                "https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1200&q=80",
                "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1200&q=80",
                "https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=80",
                "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1200&q=80"
            ]
        };

        let currentPhotoIndex = 0;
        let photoTimer = 0;

        function updateClock() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('dateDisplay').textContent = `${year}/${month}/${day}`;
            document.getElementById('clockDisplay').textContent = `${hours}:${minutes}:${seconds}`;
        }

        async function fetchWeather() {
            const { latitude, longitude, locale } = APP_CONFIG.location;
            document.getElementById('locale').textContent = locale;

            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                const data = await response.json();

                if (data.current_weather) {
                    const temp = Math.round(data.current_weather.temperature);
                    const code = data.current_weather.weathercode;

                    document.getElementById('tempDisplay').textContent = `${temp}°C`;

                    let iconClass = 'fa-cloud';
                    let desc = 'Cloudy';

                    if (code <= 1) { iconClass = 'fa-sun'; desc = 'Clear Sky'; }
                    else if (code <= 3) { iconClass = 'fa-cloud-sun'; desc = 'Partly Cloudy'; }
                    else if (code >= 51 && code <= 67) { iconClass = 'fa-cloud-showers-heavy'; desc = 'Rainy'; }
                    else if (code >= 71 && code <= 77) { iconClass = 'fa-snowflake'; desc = 'Snowy'; }
                    else if (code >= 95) { iconClass = 'fa-bolt'; desc = 'Stormy'; }

                    document.getElementById('weatherIcon').innerHTML = `<i class="fas ${iconClass}"></i>`;
                    document.getElementById('weatherDesc').textContent = desc;
                }
            } catch (error) {
                console.error("Weather sync failed", error);
                document.getElementById('weatherDesc').textContent = "Sync Error";
            }
        }

        function initPhotoFrame() {
            const frame = document.getElementById('photoFrame');
            APP_CONFIG.images.forEach((src, index) => {
                const img = document.createElement('img');
                img.src = src;
                img.id = `photo-${index}`;
                if (index === 0) img.classList.add('active');
                frame.appendChild(img);
            });
        }

        function rotatePhoto() {
            const total = APP_CONFIG.images.length;
            const prevIndex = currentPhotoIndex;
            let nextIndex;
            do {
                nextIndex = Math.floor(Math.random() * total);
            } while (nextIndex === prevIndex && total > 1);

            currentPhotoIndex = nextIndex;
            document.getElementById(`photo-${prevIndex}`).classList.remove('active');
            document.getElementById(`photo-${currentPhotoIndex}`).classList.add('active');
            photoTimer = 0;
        }

        function updateProgress() {
            photoTimer += 1000;
            const progress = (photoTimer / APP_CONFIG.intervals.photoSwitch) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;

            if (photoTimer >= APP_CONFIG.intervals.photoSwitch) {
                rotatePhoto();
            }
        }

        window.onload = () => {
            updateClock();
            fetchWeather();
            initPhotoFrame();

            setInterval(updateClock, APP_CONFIG.intervals.clock);
            setInterval(updateProgress, 1000);
            setInterval(fetchWeather, APP_CONFIG.intervals.weatherUpdate);

            setInterval(() => {
                console.log("Rescanning folder...");
            }, APP_CONFIG.intervals.rescanFolder);
        };
    </script>

</body>

</html>
