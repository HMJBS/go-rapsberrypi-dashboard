<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Gray Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f1f5f9;
            /* 落ち着いたライトグレー */
            color: #334155;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            overflow: hidden;
            width: 1280px;
            height: 1024px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 756px 400px;
            grid-template-rows: 924px;
            gap: 24px;
            padding: 50px;
            height: 100%;
            width: 100%;
            box-sizing: border-box;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .photo-frame {
            position: relative;
            overflow: hidden;
            padding: 0;
            background: #00ff00;
            border: 1px solid #e2e8f0;
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
    </style>
</head>

<body>

    <div class="dashboard-container">
        <!-- Photo Frame (Main Area) -->
        <div class="card photo-frame" id="photoFrame"></div>

        <!-- Info Panel (Side Area) -->
        <div class="info-panel">
            <!-- Time Card -->
            <div class="card flex-1">
                <div class="date-display"></div>
                <div class="clock-display"></div>
                <div class="locale"></div>
            </div>

            <!-- Weather Card -->
            <div class="card flex-[1.5] items-center text-center">
                <div class="weather-icon"></div>
                <div class="temp-display"></div>
                <div class="weather-desc"></div>
            </div>
        </div>
    </div>

</body>

</html>
